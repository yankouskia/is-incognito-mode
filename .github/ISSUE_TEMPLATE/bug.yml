name: Bug report
description: Detection is wrong, throws unexpectedly, or behaves differently than documented.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: |
        Ideally a minimal repro on StackBlitz / CodeSandbox / a tiny GitHub repo.
        Inline code snippet is fine for small cases.
      render: ts
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: '`is-incognito-mode` version'
      placeholder: e.g. 2.0.1
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: e.g. Chrome 132 / macOS 15.2 (incognito)
    validations:
      required: true

  - type: textarea
    id: detection-result
    attributes:
      label: '`detectIncognito()` output (if available)'
      description: |
        Run `detectIncognito()` and paste the full result object — it tells us
        which strategy was used and what the quota was.
      render: json
